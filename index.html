<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kid Duel - Turn-Based Demon Battle</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Kid Duel: Turn-Based Demon Battle</h1>
      <p class="controls">
        Attack: <strong>1 / 2 / 3</strong> · Defence: <strong>Q / W / E</strong> · Done:
        <strong>Space / Enter</strong> · Restart: <strong>R</strong>
      </p>
      <canvas id="gameCanvas" width="900" height="500" aria-label="Turn based battle canvas"></canvas>
    </main>

    <script src="src/main.js"></script>
  </body>
</html>
